  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
    }

    .cta-box{
      background:#1e293b;
      padding:40px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }

    .cta-box h1{
      color:white;
      margin-bottom:12px;
      font-size:32px;
    }

    .cta-box p{
      color:#cbd5e1;
      margin-bottom:28px;
      font-size:16px;
    }

    .telegram-btn{
      display:inline-block;
      padding:14px 28px;
      background:#229ED9;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
      transition:0.3s ease;
    }

    .telegram-btn:hover{
      background:#1b8bc2;
      transform:translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="cta-box">
    <h1>Join Our Telegram</h1>
   

    <!-- Replace with your Telegram link -->
    <a href="#" class="telegram-btn" target="_blank">
      Join Telegram
    </a>
  </div>

</body>
